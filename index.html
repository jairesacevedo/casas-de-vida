<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casas de Vida · Guía Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-oscuro:#14713f;
    --verde:#1e9e50;
    --verde-claro:#6cc24a;
    --verde-suave:#e8f5ec;
    --tinta:#2b2b2b;
    --gris:#6b7280;
    --blanco:#ffffff;
    --sombra:0 4px 14px rgba(20,113,63,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Poppins',sans-serif;
    color:var(--tinta);
    background:#f4f7f4;
    min-height:100vh;
  }
  /* ===== Cabecera estilo cartilla: franjas diagonales verdes ===== */
  header{
    position:relative;
    background:var(--blanco);
    padding:18px 20px 10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .franja{position:absolute;height:16px;left:0}
  .franja.f1{top:0;width:55%;background:var(--verde-oscuro);clip-path:polygon(0 0,100% 0,92% 100%,0 100%)}
  .franja.f2{top:0;width:30%;background:var(--verde-claro);clip-path:polygon(0 0,88% 0,78% 100%,0 100%);height:26px;opacity:.9}
  .franja.f3{top:0;right:0;left:auto;width:38%;background:var(--verde-oscuro);clip-path:polygon(12% 0,100% 0,100% 100%,0 100%)}
  .marca{
    display:flex;align-items:center;justify-content:center;gap:14px;
    padding-top:18px;
  }
  .logo-casa{
    display:flex;flex-direction:column;align-items:center;line-height:1;
  }
  .logo-casa .casa-icon{font-size:26px}
  .logo-casa .script{font-family:'Caveat',cursive;font-size:30px;color:#3d3d3d}
  .logo-casa .sub{font-size:9px;letter-spacing:4px;font-weight:600;color:#3d3d3d}
  .separador{width:1px;height:44px;background:#d1d5db}
  .iglesia{font-size:10px;letter-spacing:2px;font-weight:700;color:#3d3d3d;text-align:center;line-height:1.5}
  .iglesia .vara{font-family:'Caveat',cursive;font-size:24px;font-weight:600;display:block;letter-spacing:0}

  main{max-width:680px;margin:0 auto;padding:20px 16px 120px}

  /* ===== Portada del tema ===== */
  .tema-head{display:flex;align-items:center;gap:6px;margin:14px 0 6px}
  .tema-num{
    font-size:88px;font-weight:800;color:var(--verde-oscuro);line-height:.9;
    text-shadow:3px 3px 0 rgba(108,194,74,.35);
  }
  .tema-titulos .serie{font-size:13px;color:var(--tinta);font-weight:500}
  .tema-titulos h1{font-size:26px;font-weight:300;color:var(--verde);letter-spacing:1px;line-height:1.1;text-transform:uppercase}
  .tema-titulos h1 b{font-weight:700;display:block;letter-spacing:2px}

  /* ===== Píldora de sección numerada (como la cartilla) ===== */
  .pildora{
    display:flex;align-items:center;margin:34px 0 18px;position:relative;
  }
  .pildora .num{
    width:46px;height:46px;border-radius:50%;background:var(--blanco);
    border:3px solid #111;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:20px;z-index:2;flex:none;
  }
  .pildora .barra{
    margin-left:-20px;flex:1;background:linear-gradient(90deg,var(--verde-oscuro),var(--verde));
    color:#fff;font-weight:700;font-size:18px;letter-spacing:1.5px;text-transform:uppercase;
    padding:11px 16px 11px 34px;border-radius:14px;
    box-shadow:4px 4px 0 #111;
  }

  .card{
    background:var(--blanco);border-radius:16px;padding:20px;margin-bottom:14px;
    box-shadow:var(--sombra);
  }
  .versiculo{
    border-left:5px solid var(--verde-claro);
    font-size:16.5px;line-height:1.65;font-weight:400;
  }
  .versiculo p{margin-bottom:10px}
  .versiculo .vnum{color:var(--verde);font-weight:700;margin-right:4px}
  .versiculo .ref{display:block;text-align:right;font-weight:800;letter-spacing:2px;color:var(--tinta);margin-top:6px}

  .parrafo{font-size:15px;line-height:1.75;text-align:justify;margin-bottom:12px}
  .subtitulo{
    text-align:center;color:var(--verde);font-weight:700;letter-spacing:1px;
    font-size:17px;margin:8px 0 16px;text-transform:uppercase;
  }

  /* ===== Acordeón de puntos ===== */
  .punto{border:1.5px solid #e3e8e3;border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff}
  .punto summary{
    list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:14px 16px;font-weight:700;font-size:14.5px;
  }
  .punto summary::-webkit-details-marker{display:none}
  .punto summary .titulo-p{text-decoration:underline;text-underline-offset:3px}
  .punto summary .refp{color:var(--gris);font-weight:600;font-size:13px;white-space:nowrap}
  .punto[open]{border-color:var(--verde-claro);box-shadow:var(--sombra)}
  .punto .cuerpo{padding:0 16px 16px}
  .punto .flechita{color:var(--verde);transition:transform .2s;flex:none}
  .punto[open] .flechita{transform:rotate(90deg)}

  /* ===== Preguntas ===== */
  .pregunta{margin-bottom:18px}
  .pregunta label{font-weight:600;font-size:15px;display:block;margin-bottom:8px}
  .pregunta label .qnum{color:var(--verde);font-weight:800}
  .pregunta textarea{
    width:100%;min-height:84px;border:1.5px solid #dfe5df;border-radius:12px;
    padding:12px;font-family:'Poppins',sans-serif;font-size:14px;resize:vertical;
    background:#fbfdfb;
  }
  .pregunta textarea:focus{outline:none;border-color:var(--verde-claro);box-shadow:0 0 0 3px rgba(108,194,74,.18)}
  .guardado{font-size:12px;color:var(--verde);font-weight:600;height:16px;margin-top:4px;opacity:0;transition:opacity .3s}
  .guardado.visible{opacity:1}

  .accion-semana{
    background:linear-gradient(135deg,var(--verde-oscuro),var(--verde));color:#fff;
    border-radius:16px;padding:18px 20px;margin-top:8px;
  }
  .accion-semana h3{font-size:15px;letter-spacing:1px;margin-bottom:8px}
  .accion-semana p{font-size:14px;line-height:1.7}
  .check-accion{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:14px;font-weight:600}
  .check-accion input{width:20px;height:20px;accent-color:var(--verde-claro)}

  /* ===== Reto: laberinto ===== */
  .reto-instr{text-align:center;font-size:15px;font-weight:500;margin-bottom:14px}
  #laberinto{display:block;margin:0 auto;border-radius:12px;touch-action:none;max-width:100%}
  .dpad{display:grid;grid-template-columns:repeat(3,56px);gap:6px;justify-content:center;margin-top:16px}
  .dpad button{
    height:48px;border:none;border-radius:12px;background:var(--verde-suave);
    color:var(--verde-oscuro);font-size:20px;font-weight:700;cursor:pointer;
    box-shadow:0 2px 0 rgba(20,113,63,.25);
  }
  .dpad button:active{transform:translateY(2px);box-shadow:none}
  .dpad .vacio{visibility:hidden}
  .reto-win{
    display:none;text-align:center;background:var(--verde-suave);border:2px dashed var(--verde);
    border-radius:14px;padding:16px;margin-top:14px;font-weight:700;color:var(--verde-oscuro);font-size:16px;
  }
  .reto-win.visible{display:block;animation:pop .4s}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
  .btn-secundario{
    display:inline-block;margin-top:10px;border:none;background:none;color:var(--verde);
    font-weight:600;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;
  }

  /* ===== Reto: sopa de letras ===== */
  .sopa-palabras{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
  .sopa-palabras span{
    background:var(--verde-suave);color:var(--verde-oscuro);padding:4px 14px;
    border-radius:99px;font-weight:700;font-size:13px;letter-spacing:1px;
  }
  .sopa-palabras span.tachada{text-decoration:line-through;opacity:.45}
  .sopa-grid{
    display:grid;gap:3px;max-width:440px;margin:0 auto;
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  .sopa-grid .celda{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    background:#f2f7f2;border-radius:7px;font-weight:600;
    font-size:clamp(11px,3.2vw,17px);cursor:pointer;
  }
  .sopa-grid .celda.encontrada{background:var(--verde-oscuro);color:#fff}
  .sopa-grid .celda.sel{background:var(--verde-claro);color:#fff}

  /* ===== Anuncios ===== */
  .anuncio{display:flex;gap:14px;align-items:flex-start}
  .anuncio + .anuncio{margin-top:4px}
  .anuncio .icono{font-size:26px;flex:none;margin-top:2px}
  .anuncio h3{font-size:15px;color:var(--verde-oscuro)}
  .anuncio p{font-size:13.5px;color:var(--gris);line-height:1.6}
  .anuncio .destacado{color:#c0392b;font-weight:700}

  /* ===== Navegación por pasos ===== */
  .paso{display:none;animation:fade .35s}
  .paso.activo{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  nav.pie{
    position:fixed;bottom:0;left:0;right:0;background:var(--blanco);
    box-shadow:0 -4px 16px rgba(0,0,0,.08);padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    z-index:50;
  }
  .pie-inner{max-width:680px;margin:0 auto}
  .progreso{height:6px;background:#e5eae5;border-radius:99px;overflow:hidden;margin-bottom:10px}
  .progreso .relleno{height:100%;background:linear-gradient(90deg,var(--verde),var(--verde-claro));width:0;transition:width .3s;border-radius:99px}
  .pie-botones{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .pie-botones .etiqueta{font-size:12.5px;font-weight:600;color:var(--gris);text-align:center;flex:1}
  .btn-nav{
    border:none;border-radius:12px;padding:11px 22px;font-family:'Poppins',sans-serif;
    font-weight:700;font-size:14px;cursor:pointer;
  }
  .btn-nav.sig{background:var(--verde-oscuro);color:#fff;box-shadow:0 3px 0 #0c4a28}
  .btn-nav.sig:active{transform:translateY(2px);box-shadow:none}
  .btn-nav.ant{background:var(--verde-suave);color:var(--verde-oscuro)}
  .btn-nav:disabled{opacity:.35;cursor:default}

  .portada-cta{text-align:center;margin-top:26px}
  .btn-grande{
    background:linear-gradient(135deg,var(--verde-oscuro),var(--verde));color:#fff;border:none;
    border-radius:16px;padding:16px 34px;font-family:'Poppins',sans-serif;font-weight:700;
    font-size:16px;letter-spacing:.5px;cursor:pointer;box-shadow:0 5px 0 #0c4a28;
  }
  .btn-grande:active{transform:translateY(3px);box-shadow:0 2px 0 #0c4a28}
  .portada-meta{margin-top:14px;font-size:13px;color:var(--gris)}

  footer.credito{text-align:center;font-size:12px;color:#9ca3af;margin-top:30px}
</style>
</head>
<body>

<header>
  <div class="franja f1"></div>
  <div class="franja f2"></div>
  <div class="franja f3"></div>
  <div class="marca">
    <div class="logo-casa">
      <span class="casa-icon">🏠</span>
      <span class="script">Casas</span>
      <span class="sub">DE VIDA</span>
    </div>
    <div class="separador"></div>
    <div class="iglesia">
      IGLESIA LA
      <span class="vara">Vara de Dios</span>
      <span style="font-size:7px;letter-spacing:1.5px">VISIÓN · AUTORIDAD · RESTAURACIÓN · ADORACIÓN</span>
    </div>
  </div>
</header>

<main id="app"></main>

<nav class="pie" id="pie" style="display:none">
  <div class="pie-inner">
    <div class="progreso"><div class="relleno" id="barra"></div></div>
    <div class="pie-botones">
      <button class="btn-nav ant" id="btnAnt">‹ Atrás</button>
      <div class="etiqueta" id="etiquetaPaso"></div>
      <button class="btn-nav sig" id="btnSig">Siguiente ›</button>
    </div>
  </div>
</nav>

<script>
/* ==========================================================
   CONTENIDO SEMANAL — cada semana se reemplaza este objeto
   con el material del nuevo PDF de Casas de Vida.
   ========================================================== */
const TEMA = {
  numero: 3,
  serie: "Discipulado responsable en Familia",
  tituloLinea1: "Ser discípulo es",
  tituloLinea2: "hacer más que saber",
  pasaje: {
    ref: "JUAN 13:13-17",
    versos: [
      { n: 13, t: "Vosotros me llamáis Maestro, y Señor; y decís bien, porque lo soy." },
      { n: 14, t: "Pues si yo, el Señor y el Maestro, he lavado vuestros pies, vosotros también debéis lavaros los pies los unos a los otros." },
      { n: 15, t: "Porque ejemplo os he dado, para que como yo os he hecho, vosotros también hagáis." },
      { n: 16, t: "De cierto, de cierto os digo: El siervo no es mayor que su señor, ni el enviado es mayor que el que le envió." },
      { n: 17, t: "Si sabéis estas cosas, bienaventurados seréis si las hiciereis." }
    ]
  },
  intro: [
    "Jesús demostró la importancia del discipulado al hacer del entrenamiento de los doce discípulos una prioridad durante su ministerio público en la tierra.",
    "Jesús entrenó a sus discípulos para que ellos a su vez se multiplicaran en otros, fueran una extensión de su ministerio en la tierra. El discipulado es el mejor método para transformar el mundo para Dios. <b>La clave es que ser discípulo es hacer más que saber.</b>"
  ],
  subtituloPuntos: "Entendiendo ser discípulo",
  puntos: [
    {
      titulo: "1. Ser discípulo no es saber más que hacer",
      ref: "Juan 13:13",
      texto: [
        "Jesús resaltó lo que era, Señor y Maestro, pero esto no fue un impedimento para que él pudiera lavar los pies de sus discípulos.",
        "La enseñanza de Jesús es que no importa lo que seamos, el discipulado siempre es más hacer que saber. Hay gente que necesita que le lavemos los pies por la suciedad del pecado."
      ]
    },
    {
      titulo: "2. Ser discípulo actúa",
      ref: "Juan 13:17",
      texto: [
        "El gran mensaje de Jesús a través del lavamiento de los pies a los discípulos, es que debemos hacer más que saber. Muchos sabemos de Biblia y teología, pero no hacemos nada por otros, nos cuesta hacer discípulos.",
        "Jesús NO quería que sus discípulos se convirtieran solamente en conocedores del Reino, sino que se transformaran en practicantes de la Palabra en el Reino. El saber es importante, pero se debe evidenciar en un hacer de amor y misericordia."
      ]
    }
  ],
  conclusion: [
    "El discipulado es importante porque fue una prioridad para Jesús y porque Jesús formó a sus discípulos para que ellos fueran multiplicadores de su visión.",
    "Ser discípulo no es un puesto o status en la iglesia. Ser discípulo es servir a otros y es hacer más, que saber. Seremos bienaventurados cuando hagamos lo que sabemos."
  ],
  preguntas: [
    "¿Cómo podemos nosotros lavar los pies en nuestra familia y los de otros?",
    "¿Qué cualidades cree que Jesús mostró al lavar los pies de sus discípulos?",
    "¿Qué necesitamos para ser más hacedores?"
  ],
  accionSemana: "Continuando con el mismo amigo al que le hablamos la semana pasada, vamos a conversar con él o ella y le preguntaremos si tiene una necesidad o petición por la cual quiere que oremos. De esta manera identificaremos si podemos hacer una obra para ayudarle en esa necesidad y el tema específico por el cual estaremos orando por él o ella.<br><br><em>Nota: no olvides llenar el Compromiso de Oración y llevarlo a la iglesia para que juntos intercedamos por tu amigo o amiga.</em>",
  reto: {
    tipo: "sopa",
    instruccion: "Encuentra las palabras clave",
    palabras: ["JESÚS", "PEDRO", "AMOR", "TOALLA", "LAVAR", "DISCÍPULOS"],
    mensajeWin: "¡Encontraron todas las palabras! ¡Reto completado en familia!"
  },
  anuncios: [
    { icono: "🔥", titulo: "Legado de Oración", detalle: "Conexión con Dios: lunes y viernes 8:30 PM por Zoom. Intercesión de la madrugada: martes, miércoles y jueves 5:30 AM por Zoom." },
    { icono: "⛪", titulo: "Servicios Dominicales", detalle: "Un tiempo para adorar, aprender y crecer juntos. 7:30 AM y 10:00 AM." },
    { icono: "💧", titulo: "Bautizos — 12 de julio", detalle: "<span class='destacado'>¡Este domingo!</span> Inscríbete con tu líder. ¡Da el siguiente paso en tu fe!" },
    { icono: "🎨", titulo: "Escuela Kids", detalle: "De 3 a 9 años, en los servicios de 7:30 AM y 10:00 AM." }
  ]
};
/* ============ FIN DEL CONTENIDO SEMANAL ============ */

const claveLS = `casaDeVida_tema${TEMA.numero}`;
const guardar = (k,v)=>{ const d=JSON.parse(localStorage.getItem(claveLS)||"{}"); d[k]=v; localStorage.setItem(claveLS,JSON.stringify(d)); };
const leer = k => (JSON.parse(localStorage.getItem(claveLS)||"{}"))[k];

/* ===== Construcción de las secciones (pasos) ===== */
const app = document.getElementById("app");

function pildora(num, texto){
  return `<div class="pildora"><div class="num">${num}</div><div class="barra">${texto}</div></div>`;
}

const pasos = [];

/* Paso 0 — Portada */
pasos.push({
  etiqueta:"Portada",
  html:`
    <div class="tema-head">
      <div class="tema-num">${TEMA.numero}</div>
      <div class="tema-titulos">
        <div class="serie">Serie: ${TEMA.serie}</div>
        <h1>${TEMA.tituloLinea1}<b>${TEMA.tituloLinea2}</b></h1>
      </div>
    </div>
    <div class="card versiculo">
      ${TEMA.pasaje.versos.map(v=>`<p><span class="vnum">${v.n}</span>${v.t}</p>`).join("")}
      <span class="ref">${TEMA.pasaje.ref}</span>
    </div>
    <div class="portada-cta">
      <button class="btn-grande" onclick="irA(1)">Comenzar la reunión 🙏</button>
      <div class="portada-meta">Guía interactiva · ${TEMA.serie}</div>
    </div>`
});

/* Paso 1 — Aprendamos en Familia (enseñanza) */
pasos.push({
  etiqueta:"Aprendamos en Familia",
  html:`
    ${pildora(1,"Aprendamos en Familia")}
    <div class="card">${TEMA.intro.map(p=>`<p class="parrafo">${p}</p>`).join("")}</div>
    <div class="subtitulo">${TEMA.subtituloPuntos}</div>
    ${TEMA.puntos.map((p,i)=>`
      <details class="punto" ${i===0?"open":""}>
        <summary>
          <span class="flechita">➤</span>
          <span class="titulo-p" style="flex:1">${p.titulo}</span>
          <span class="refp">${p.ref}</span>
        </summary>
        <div class="cuerpo">${p.texto.map(t=>`<p class="parrafo">${t}</p>`).join("")}</div>
      </details>`).join("")}
    <div class="card" style="margin-top:18px">
      <h3 style="text-decoration:underline;margin-bottom:10px;font-size:15px">CONCLUSIÓN:</h3>
      ${TEMA.conclusion.map(p=>`<p class="parrafo">${p}</p>`).join("")}
    </div>`
});

/* Paso 2 — Preguntas */
pasos.push({
  etiqueta:"Conversemos en Familia",
  html:`
    ${pildora(2,"Conversemos en Familia")}
    <div class="card">
      ${TEMA.preguntas.map((q,i)=>`
        <div class="pregunta">
          <label><span class="qnum">${i+1}.</span> ${q}</label>
          <textarea data-q="${i}" placeholder="Escriban aquí su respuesta...">${leer("q"+i)||""}</textarea>
          <div class="guardado" id="g${i}">✓ Guardado</div>
        </div>`).join("")}
    </div>
    <div class="accion-semana">
      <h3>📌 ACCIÓN DE LA SEMANA</h3>
      <p>${TEMA.accionSemana}</p>
      <label class="check-accion">
        <input type="checkbox" id="chkAccion" ${leer("accion")?"checked":""}>
        ¡Nos comprometemos esta semana!
      </label>
    </div>`
});

/* Paso 3 — Reto Familiar (el tipo cambia según la cartilla de la semana) */
function retoHTML(){
  if(TEMA.reto.tipo === "sopa") return `
    <p class="reto-instr">${TEMA.reto.instruccion}</p>
    <div class="sopa-palabras" id="sopaPalabras"></div>
    <div class="sopa-grid" id="sopa"></div>
    <div class="reto-win" id="retoWin">🎉 ${TEMA.reto.mensajeWin}</div>
    <div style="text-align:center"><button class="btn-secundario" id="btnNuevoReto">↻ Nuevo tablero</button></div>`;
  return `
    <p class="reto-instr">${TEMA.reto.instruccion}</p>
    <canvas id="laberinto" width="450" height="450"></canvas>
    <div class="dpad">
      <span class="vacio"></span><button data-dir="up">▲</button><span class="vacio"></span>
      <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
    </div>
    <div class="reto-win" id="retoWin">🎉 ${TEMA.reto.mensajeWin}</div>
    <div style="text-align:center"><button class="btn-secundario" id="btnNuevoReto">↻ Nuevo laberinto</button></div>`;
}
pasos.push({
  etiqueta:"Reto Familiar",

function irA(i){

function iniciarReto(){

/* ===== Laberinto (se genera aleatorio: siempre tiene solución) ===== */
const CELDAS = 21; // impar — a mayor número, más difícil el laberinto
let lab, jugador, meta, ganado=false, labIniciado=false;

function generarLaberinto(){
  lab = Array.from({length:CELDAS},()=>Array(CELDAS).fill(1));
  const dirs=[[0,-2],[0,2],[-2,0],[2,0]];
  function tallar(x,y){
    lab[y][x]=0;
    const d=[...dirs].sort(()=>Math.random()-.5);
    for(const [dx,dy] of d){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&nx<CELDAS-1&&ny>0&&ny<CELDAS-1&&lab[ny][nx]===1){
        lab[y+dy/2][x+dx/2]=0;
        tallar(nx,ny);
      }
    }
  }
  tallar(1,CELDAS-2);
  jugador={x:1,y:CELDAS-2};
  meta={x:CELDAS-2,y:1};
  ganado=false;
  document.getElementById("retoWin").classList.remove("visible");
}

function dibujar(){
  const cv=document.getElementById("laberinto");
  if(!cv) return;
  const ctx=cv.getContext("2d");
  const t=cv.width/CELDAS;
  ctx.fillStyle="#f2f7f2"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#14713f";
  for(let y=0;y<CELDAS;y++)for(let x=0;x<CELDAS;x++)
    if(lab[y][x]===1) ctx.fillRect(x*t,y*t,t+0.5,t+0.5);
  ctx.font=`${t*0.75}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(TEMA.reto.emojiMeta, meta.x*t+t/2, meta.y*t+t/2);
  ctx.fillText(TEMA.reto.emojiJugador, jugador.x*t+t/2, jugador.y*t+t/2);
}

function mover(dx,dy){
  if(ganado) return;
  const nx=jugador.x+dx, ny=jugador.y+dy;
  if(nx<0||ny<0||nx>=CELDAS||ny>=CELDAS||lab[ny][nx]===1) return;
  jugador={x:nx,y:ny};
  dibujar();
  if(nx===meta.x&&ny===meta.y){
    ganado=true;
    document.getElementById("retoWin").classList.add("visible");
  }
}

/* ===== Sopa de letras (se genera aleatoria con las palabras del tema) ===== */
const SOPA_N = 11;
const LETRAS_RELLENO = "ABCDEFGHIJLMNOPQRSTUVYZÁÉÍÓÚÑ";
let sopaGrid, sopaEncontradas = new Set(), sopaIniciada = false;

function colocarPalabra(palabra){
  const letras = [...palabra];
  const dirs = [[1,0],[0,1],[1,1],[1,-1]]; // [dc,dr]: →, ↓, ↘, ↗
  for(let i=0; i<400; i++){
    const [dc,dr] = dirs[Math.floor(Math.random()*dirs.length)];
    const c0 = Math.floor(Math.random()*SOPA_N), r0 = Math.floor(Math.random()*SOPA_N);
    const cf = c0+dc*(letras.length-1), rf = r0+dr*(letras.length-1);
    if(cf<0||cf>=SOPA_N||rf<0||rf>=SOPA_N) continue;
    let libre = true;
    for(let j=0; j<letras.length; j++){
      const v = sopaGrid[r0+dr*j][c0+dc*j];
      if(v && v!==letras[j]){ libre=false; break; }
    }
    if(!libre) continue;
    for(let j=0; j<letras.length; j++) sopaGrid[r0+dr*j][c0+dc*j] = letras[j];
    return true;
  }
  return false;
}

function generarSopa(){
  const palabras = [...TEMA.reto.palabras].sort((a,b)=>b.length-a.length);
  for(let t=0; t<80; t++){
    sopaGrid = Array.from({length:SOPA_N},()=>Array(SOPA_N).fill(""));
    if(palabras.every(colocarPalabra)) break;
  }
  for(let r=0; r<SOPA_N; r++) for(let c=0; c<SOPA_N; c++)
    if(!sopaGrid[r][c]) sopaGrid[r][c] = LETRAS_RELLENO[Math.floor(Math.random()*LETRAS_RELLENO.length)];
  sopaEncontradas = new Set();
}

function dibujarSopa(){
  const cont = document.getElementById("sopa");
  cont.style.gridTemplateColumns = `repeat(${SOPA_N},1fr)`;
  cont.innerHTML = sopaGrid.map((fila,r)=>
    fila.map((l,c)=>`<div class="celda" data-r="${r}" data-c="${c}">${l}</div>`).join("")
  ).join("");
  document.getElementById("sopaPalabras").innerHTML =
    TEMA.reto.palabras.map((p,i)=>`<span id="pal${i}">${p}</span>`).join("");
  document.getElementById("retoWin").classList.remove("visible");
}

let selInicio = null, selCeldas = [];
function celdaEn(x,y){
  const el = document.elementFromPoint(x,y);
  return el && el.classList && el.classList.contains("celda") ? el : null;
}
function lineaCeldas(a,b){
  const r0=+a.dataset.r, c0=+a.dataset.c, r1=+b.dataset.r, c1=+b.dataset.c;
  if(!(r0===r1 || c0===c1 || Math.abs(r1-r0)===Math.abs(c1-c0))) return null;
  const dr=Math.sign(r1-r0), dc=Math.sign(c1-c0);
  const len=Math.max(Math.abs(r1-r0),Math.abs(c1-c0))+1;
  const celdas=[];
  for(let j=0;j<len;j++){
    const el=document.querySelector(`.celda[data-r="${r0+dr*j}"][data-c="${c0+dc*j}"]`);
    if(!el) return null;
    celdas.push(el);
  }
  return celdas;
}
function limpiarSel(){ selCeldas.forEach(el=>el.classList.remove("sel")); selCeldas=[]; }

function iniciarSopa(){
  if(sopaIniciada) return;
  sopaIniciada = true;
  generarSopa();
  dibujarSopa();
  const cont = document.getElementById("sopa");
  cont.addEventListener("pointerdown", e=>{
    const c = celdaEn(e.clientX,e.clientY);
    if(!c) return;
    e.preventDefault();
    selInicio = c; limpiarSel(); selCeldas=[c]; c.classList.add("sel");
    cont.setPointerCapture(e.pointerId);
  });
  cont.addEventListener("pointermove", e=>{
    if(!selInicio) return;
    const c = celdaEn(e.clientX,e.clientY);
    if(!c) return;
    const linea = lineaCeldas(selInicio,c);
    if(!linea) return;
    limpiarSel(); selCeldas=linea; linea.forEach(el=>el.classList.add("sel"));
  });
  cont.addEventListener("pointerup", ()=>{
    if(!selInicio) return;
    const txt = selCeldas.map(el=>el.textContent).join("");
    const rev = [...txt].reverse().join("");
    const idx = TEMA.reto.palabras.findIndex(p=>p===txt||p===rev);
    if(idx>-1 && !sopaEncontradas.has(idx)){
      sopaEncontradas.add(idx);
      selCeldas.forEach(el=>el.classList.add("encontrada"));
      document.getElementById("pal"+idx).classList.add("tachada");
      if(sopaEncontradas.size===TEMA.reto.palabras.length)
        document.getElementById("retoWin").classList.add("visible");
    }
    limpiarSel(); selInicio=null;
  });
  document.getElementById("btnNuevoReto").addEventListener("click", ()=>{ generarSopa(); dibujarSopa(); });
}

function iniciarLaberinto(){
  if(!labIniciado){
    labIniciado=true;
    generarLaberinto();
    document.querySelectorAll(".dpad button").forEach(b=>{
      b.addEventListener("click",()=>{
        const d=b.dataset.dir;
        mover(d==="left"?-1:d==="right"?1:0, d==="up"?-1:d==="down"?1:0);
      });
    });
    document.getElementById("btnNuevoReto").addEventListener("click",()=>{generarLaberinto();dibujar();});
    document.addEventListener("keydown",e=>{
      if(actual!==3) return;
      const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
      if(m[e.key]){ e.preventDefault(); mover(...m[e.key]); }
    });
    /* deslizar en pantallas táctiles */
    let sx,sy;
    const cv=document.getElementById("laberinto");
    cv.addEventListener("pointerdown",e=>{sx=e.clientX;sy=e.clientY;});
    cv.addEventListener("pointerup",e=>{
      const dx=e.clientX-sx, dy=e.clientY-sy;
      if(Math.abs(dx)<12&&Math.abs(dy)<12) return;
      if(Math.abs(dx)>Math.abs(dy)) mover(dx>0?1:-1,0); else mover(0,dy>0?1:-1);
    });
  }
  dibujar();
}
</script>
